name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test
        env:
          CI: "true"
          BASE_URL: https://drawdowndesk.vercel.app
          JEST_USERNAME: ${{ secrets.JEST_USERNAME }}
          JEST_PASSWORD: ${{ secrets.JEST_PASSWORD }}

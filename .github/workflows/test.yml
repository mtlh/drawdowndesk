name: Deploy and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Debug secrets
        run: |
          echo "VERCEL_TOKEN present: $([ -n '$VERCEL_TOKEN' ] && echo yes || echo no)"
          echo "VERCEL_ORG_ID present: $([ -n '$VERCEL_ORG_ID' ] && echo yes || echo no)"
          echo "VERCEL_PROJECT_ID present: $([ -n '$VERCEL_PROJECT_ID' ] && echo yes || echo no)"

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview

      - name: Build Project
        run: vercel build --prod

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod
        id: vercel

      - name: Store Deployment URL
        run: echo "DEPLOYMENT_URL=${{ steps.vercel.outputs.url }}" >> $GITHUB_ENV

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test
        env:
          CI: "true"
          BASE_URL: https://drawdowndesk.vercel.app
          JEST_USERNAME: ${{ secrets.JEST_USERNAME }}
          JEST_PASSWORD: ${{ secrets.JEST_PASSWORD }}
